<!DOCTYPE html>
<html lang="en">
<head>
<title>Salary Calculator (Free) – Estimate Earnings Instantly</title>
<meta name="description" content="Calculate salary, monthly income, and yearly earnings instantly.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="index, follow">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<h1>Hourly to Salary Calculator</h1>

<label>Hourly Rate ($):</label>
<input type="number" id="hourly"><br><br>

<label>Hours per week:</label>
<input type="number" id="hours"><br><br>

<button onclick="calc()">Calculate</button>

<h2 id="result"></h2>

<script>
function calc(){
let h = document.getElementById("hourly").value;
let w = document.getElementById("hours").value;

let yearly = h * w * 52;
let monthly = yearly / 12;

document.getElementById("result").innerHTML =
"Yearly: $" + yearly.toFixed(2) + "<br>Monthly: $" + monthly.toFixed(2);
}
</script>
