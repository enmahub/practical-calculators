<!DOCTYPE html>
<html lang="en">
<head>
<title>Calorie Calculator (Free) – Estimate Daily Calories Instantly</title>
<meta name="description" content="Estimate your daily calorie needs based on your weight, height, and age.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="index, follow">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="top">Daily Calorie Calculator</div>
<div class="wrap">
<div class="card">
<h1>Daily Calorie Calculator</h1>

<input id="w" placeholder="Weight (kg)">
<input id="h" placeholder="Height (cm)">
<input id="a" placeholder="Age">

<button onclick="calc()">Calculate</button>
<h2 class="result" id="r"></h2>

<script>
function calc(){
let cal = 10*w.value + 6.25*h.value - 5*a.value + 5;
r.innerHTML="Calories/day: "+cal;
}
</script>
