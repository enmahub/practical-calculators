<head>
<title>Macros Calculator (Free) – Calculate Protein, Carbs, and Fat Instantly</title>
<meta name="description" content="Estimate protein, carbohydrate, and fat intake based on total calorie input.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
<div class="top">
<div class="wrap top-inner">
<a class="brand" href="index.html">Practical Calculators</a>
</div>
</div>
<div class="wrap">
<div class="card">
<h1>Macros Calculator</h1>

<input id="cal" placeholder="Calories">

<button onclick="calc()">Calculate</button>

<h2 class="result" id="r"></h2>

<script>
function calc(){
let protein = cal.value * 0.3 / 4;
let carbs = cal.value * 0.4 / 4;
let fat = cal.value * 0.3 / 9;

r.innerHTML = 
"Protein: " + protein.toFixed(1) + "g<br>" +
"Carbs: " + carbs.toFixed(1) + "g<br>" +
"Fat: " + fat.toFixed(1) + "g";
}
</script>
