<!DOCTYPE html>
<html>
<body>
<h1>Profit Margin Calculator</h1>

<input id="revenue" placeholder="Revenue">
<input id="cost" placeholder="Cost">

<button onclick="calc()">Calculate</button>

<h2 id="r"></h2>

<script>
function calc(){
let margin = ((revenue.value - cost.value) / revenue.value) * 100;
r.innerHTML = "Margin: " + margin.toFixed(2) + "%";
}
</script>
</body>
</html>
