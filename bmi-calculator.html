<div class="wrap">
<div class="card">
<h1>BMI Calculator</h1>

<input id="w" placeholder="Weight (kg)">
<input id="h" placeholder="Height (m)">

<button onclick="calc()">Calculate</button>
<h2 class="result" id="r">Result: -</h2>

<script>
function calc(){
const weight = parseFloat(w.value);
const height = parseFloat(h.value);
if (!Number.isFinite(weight) || !Number.isFinite(height) || height <= 0) {
  r.innerHTML = "Please enter valid weight and height.";
  return;
}
const bmi = weight / (height * height);
let tag = "Obese";
if (bmi < 18.5) {
  tag = "Underweight";
} else if (bmi < 25) {
  tag = "Normal";
} else if (bmi < 30) {
  tag = "Overweight";
}
r.innerHTML="BMI: " + bmi.toFixed(2) + " (" + tag + ")";
}
</script>
