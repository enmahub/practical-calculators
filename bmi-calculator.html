<title>BMI Calculator (Free) – Calculate Body Mass Index Instantly</title>

<div class="wrap">
<div class="card">
<h1>BMI Calculator</h1>

<input id="w" placeholder="Weight (kg)">
<input id="h" placeholder="Height (m)">

<button onclick="calc()">Calculate</button>
<h2 class="result" id="r"></h2>

<script>
function calc(){
let bmi=w.value/(h.value*h.value);
r.innerHTML="BMI: "+bmi.toFixed(2);
}
</script>
