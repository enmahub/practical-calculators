<!DOCTYPE html>
<html>
<head>
<title>USD to EUR Converter – Convert Dollars to Euros</title>
<meta name="description" content="Convert US dollars (USD) to euros (EUR) quickly based on a fixed exchange rate.">
<meta name="robots" content="index, follow">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<h1>USD to EUR Converter</h1>

<input id="usd" placeholder="USD">
<button onclick="calc()">Convert</button>

<h2 id="r"></h2>

<script>
function calc(){
let rate = 0.92; // static example rate
r.innerHTML = (usd.value * rate).toFixed(2) + " EUR";
}
</script>
