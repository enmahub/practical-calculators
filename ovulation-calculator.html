<head>
<title>Ovulation Calculator (Free) – Predict Fertility Window Instantly</title>
<meta name="description" content="Estimate your ovulation date based on your last period and cycle length.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="index, follow">

<body>
<div class="top">Ovulation Calculator</div>
<div class="wrap">
<div class="card">
<h1>Ovulation Calculator</h1>

<input type="date" id="last">
<input id="cycle" placeholder="Cycle length (days)">

<button onclick="calc()">Calculate</button>

<h2 class="result" id="r"></h2>

<script>
function calc(){
let d = new Date(last.value);
d.setDate(d.getDate() + (cycle.value - 14));
r.innerHTML = "Estimated ovulation: " + d.toDateString();
}
</script>
