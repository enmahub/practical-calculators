<!DOCTYPE html>
<html lang="en">
<head>
<title>Inflation Calculator (Free) – Calculate Future Value Instantly</title>
<meta name="description" content="Estimate the future value of money based on an inflation rate over time.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="index, follow">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="top">
<div class="wrap top-inner">
<a class="brand" href="index.html">Practical Calculators</a>
</div>
</div>
<div class="wrap">
<div class="card">
<h1>Inflation Calculator</h1>

<input id="amount" placeholder="Amount">
<input id="rate" placeholder="Inflation %">
<input id="years" placeholder="Years">

<button onclick="calc()">Calculate</button>

<h2 class="result" id="r"></h2>

<script>
function calc(){
let future = amount.value * Math.pow(1 + rate.value/100, years.value);
r.innerHTML = "Future value: $" + future.toFixed(2);
}
</script>
</div>
